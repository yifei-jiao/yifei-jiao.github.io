bio: |
  I am currently a postdoctoral researcher at University of California Santa Cruz and Tsinghua University.
  My <a href="https://yifei-jiao.github.io/research/">research</a> interests are focused on the collisional and dynamical evolution of small planetary bodies, rings, and moons.
  I developed the <a href="https://sphsol-tutorial.readthedocs.io" target="_blank">SPHSOL code</a> for simulating hypervelocity impacts and tidal responses of planetary bodies.
  I am eager to exploring any unsolved exciting questions of our solar system using theoretical and numerical methods, and open to collaborations.
  A copy of my CV is availble <a href="/uploads/Rezume.pdf" target="_blank">here</a>.
  
  Feel free to contact me at jiaoyf.thu@gmail.com for any discussions! 
