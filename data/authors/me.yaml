bio: I am a postdoc researcher at University of California Santa Cruz and Tsinghua University. My <a href="https://jiaoyf-thu.github.io/research/">research</a> interests are focused on the collisional and dynamical evolution of small planetary bodies and moons, as well as the asteroid exploration and deflection dynamics. I am also engaged in the exploration of numerical simulations and optimization algorithms in planetary science. I am eager to exploring any unsolved exciting questions of our solar system using theoretical and numerical methods and open to collaborations. A copy of my CV is availble <a href="https://jiaoyf-thu.github.io/files/Rezume.pdf" target="_blank">here</a>.
